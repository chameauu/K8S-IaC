---
- name: Install kubeadm on master
  apt:
    name:
      - kubeadm
    state: present
    update_cache: yes

- name: Hold kubeadm package
  dpkg_selections:
    name: kubeadm
    selection: hold

- name: Check if cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init

- name: Initialize Kubernetes cluster
  command: >
    kubeadm init
    --apiserver-advertise-address={{ master_ip }}
    --pod-network-cidr={{ pod_cidr }}
    --node-name master
  when: not kubeadm_init.stat.exists

- name: Create .kube directory for vagrant user
  file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0755'

- name: Copy kubeconfig for vagrant user
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    owner: vagrant
    group: vagrant
    mode: '0644'
    remote_src: yes

- name: Create .kube directory for root
  file:
    path: /root/.kube
    state: directory
    mode: '0755'

- name: Copy kubeconfig for root
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    mode: '0644'
    remote_src: yes

- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_command_raw
  failed_when: false

- name: Set join command as fact
  set_fact:
    join_command: "{{ join_command_raw.stdout_lines[0] }}"
  when: join_command_raw.stdout_lines is defined and join_command_raw.stdout_lines | length > 0

- name: Display join command
  debug:
    msg: "Join command: {{ join_command }}"
  when: join_command is defined

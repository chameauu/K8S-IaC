---
# Main tasks for Prometheus and Grafana deployment

- name: Add Prometheus Helm repository
  command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  register: helm_repo_add
  changed_when: "'already exists' not in helm_repo_add.stderr"
  failed_when: false

- name: Update Helm repositories
  command: helm repo update
  changed_when: false
  failed_when: false

- name: Create monitoring namespace
  shell: kubectl create namespace {{ prometheus_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  changed_when: false

- name: Label monitoring namespace
  shell: |
    kubectl label namespace {{ prometheus_namespace }} monitoring=enabled --overwrite
  changed_when: false

- name: Create temporary directory for Helm values
  tempfile:
    state: directory
    suffix: _prometheus
  register: prometheus_temp_dir

- name: Generate Prometheus Helm values from template
  template:
    src: prometheus-values.yaml.j2
    dest: "{{ prometheus_temp_dir.path }}/prometheus-values.yaml"

- name: Install Prometheus stack via Helm
  shell: |
    helm upgrade --install {{ prometheus_release_name }} {{ prometheus_chart_name }} \
      --namespace {{ prometheus_namespace }} \
      --values {{ prometheus_temp_dir.path }}/prometheus-values.yaml \
      --wait \
      --timeout 10m
  register: helm_install_result
  changed_when: "'has been upgraded' in helm_install_result.stdout or 'has been installed' in helm_install_result.stdout"

- name: Wait for Prometheus StatefulSet to be ready
  shell: |
    kubectl rollout status statefulset/prometheus-prometheus-kube-prometheus-prometheus \
      -n {{ prometheus_namespace }} \
      --timeout=30m
  changed_when: false

- name: Wait for Grafana Deployment to be ready
  shell: |
    kubectl rollout status deployment/prometheus-grafana \
      -n {{ prometheus_namespace }} \
      --timeout=10m
  changed_when: false

- name: Verify Prometheus pods are running
  shell: |
    kubectl get pods -n {{ prometheus_namespace }} -o wide
  register: prometheus_pods
  changed_when: false

- name: Display Prometheus pods status
  debug:
    msg: "{{ prometheus_pods.stdout }}"

- name: Verify services are accessible
  shell: |
    kubectl get svc -n {{ prometheus_namespace }} -o wide
  register: prometheus_services
  changed_when: false

- name: Display services status
  debug:
    msg: "{{ prometheus_services.stdout }}"

- name: Create Grafana Ingress resource
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: grafana-ingress
      namespace: {{ prometheus_namespace }}
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
        nginx.ingress.kubernetes.io/ssl-redirect: "false"
    spec:
      ingressClassName: nginx
      rules:
      - host: {{ grafana_ingress_host }}
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-grafana
                port:
                  number: 80
    EOF
  when: grafana_ingress_enabled | bool
  register: grafana_ingress_result
  changed_when: "'created' in grafana_ingress_result.stdout or 'configured' in grafana_ingress_result.stdout"

- name: Create Prometheus Ingress resource
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: prometheus-ingress
      namespace: {{ prometheus_namespace }}
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
        nginx.ingress.kubernetes.io/ssl-redirect: "false"
    spec:
      ingressClassName: nginx
      rules:
      - host: {{ prometheus_ingress_host }}
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-kube-prometheus-prometheus
                port:
                  number: 9090
    EOF
  when: prometheus_ingress_enabled | bool
  register: prometheus_ingress_result
  changed_when: "'created' in prometheus_ingress_result.stdout or 'configured' in prometheus_ingress_result.stdout"

- name: Verify Ingress resources
  shell: kubectl get ingress -n {{ prometheus_namespace }}
  register: ingress_status
  changed_when: false
  when: prometheus_ingress_enabled | bool or grafana_ingress_enabled | bool

- name: Display Ingress status
  debug:
    msg: "{{ ingress_status.stdout }}"
  when: prometheus_ingress_enabled | bool or grafana_ingress_enabled | bool

- name: Display access information
  debug:
    msg: |
      ========================================
      Prometheus & Grafana Deployment Complete
      ========================================
      
      Prometheus:
        NodePort URL: http://10.0.2.10:{{ prometheus_service_port }}
        {% if prometheus_ingress_enabled %}Ingress URL: http://{{ prometheus_ingress_host }}:31080{% endif %}

        Status: Check "Status" → "Targets" to see discovered pods
      
      Grafana:
        NodePort URL: http://10.0.2.10:{{ grafana_service_port }}
        {% if grafana_ingress_enabled %}Ingress URL: http://{{ grafana_ingress_host }}:31080{% endif %}

        Username: {{ grafana_admin_user }}
        Password: (from vault)
      
      Alertmanager:
        URL: http://10.0.2.10:{{ alertmanager_service_port }}
      
      {% if prometheus_ingress_enabled or grafana_ingress_enabled %}
      Ingress Setup:
        Add to /etc/hosts on your host machine:
          127.0.0.1 {{ grafana_ingress_host }}
          127.0.0.1 {{ prometheus_ingress_host }}
        
        Add port forwarding to Vagrantfile:
          master.vm.network "forwarded_port", guest: 31080, host: 31080, host_ip: "127.0.0.1"
      {% endif %}

      To verify pod scraping:
        kubectl get pods -A -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\t"}{.metadata.annotations.prometheus\.io/scrape}{"\n"}{end}'
      
      ========================================

- name: Clean up temporary directory
  file:
    path: "{{ prometheus_temp_dir.path }}"
    state: absent

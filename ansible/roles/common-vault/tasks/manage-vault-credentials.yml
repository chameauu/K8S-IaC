---
# Manage vault credentials
# This task file adds or updates credentials in the vault

- name: Ensure vault password file exists
  stat:
    path: "{{ lookup('env', 'HOME') }}/.ansible_vault_pass"
  register: vault_pass_check
  delegate_to: localhost
  become: false
  run_once: true

- name: Fail if vault password file doesn't exist
  fail:
    msg: "Vault password file not found. Run: ansible-playbook ansible/playbooks/setup-ansible-vault.yml"
  when: not vault_pass_check.stat.exists
  delegate_to: localhost
  become: false
  run_once: true

- name: Check if vault file is encrypted
  shell: head -1 "{{ playbook_dir }}/../group_vars/all/vault.yml" | grep -q '^\$ANSIBLE_VAULT'
  register: vault_encrypted
  failed_when: false
  changed_when: false
  delegate_to: localhost
  become: false
  run_once: true

- name: Decrypt vault file temporarily
  command: >
    ansible-vault decrypt {{ playbook_dir }}/../group_vars/all/vault.yml
    --vault-password-file {{ lookup('env', 'HOME') }}/.ansible_vault_pass
  when: vault_encrypted.rc == 0
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: true

- name: Read current vault content
  slurp:
    src: "{{ playbook_dir }}/../group_vars/all/vault.yml"
  register: vault_content
  delegate_to: localhost
  become: false
  run_once: true

- name: Parse vault YAML
  set_fact:
    vault_data: "{{ vault_content.content | b64decode | from_yaml | default({}) }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Merge new credentials into vault
  set_fact:
    updated_vault_data: "{{ vault_data | combine(vault_credentials) }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Write updated vault content
  copy:
    content: |
      ---
      # Encrypted vault variables
      # Each tool adds its own credentials here
      # This file is managed by Ansible roles - do not edit manually
      
      {{ updated_vault_data | to_nice_yaml(indent=2) }}
    dest: "{{ playbook_dir }}/../group_vars/all/vault.yml"
  delegate_to: localhost
  become: false
  run_once: true

- name: Re-encrypt vault file
  command: >
    ansible-vault encrypt {{ playbook_dir }}/../group_vars/all/vault.yml
    --vault-password-file {{ lookup('env', 'HOME') }}/.ansible_vault_pass
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: true

- name: Display credentials added
  debug:
    msg: "Added {{ vault_credentials.keys() | list }} to vault"
  delegate_to: localhost
  become: false
  run_once: true

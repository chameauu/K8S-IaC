---
# Jenkins Helm Chart defaults
jenkins_helm_repo_name: jenkins
jenkins_helm_repo_url: https://charts.jenkins.io
jenkins_helm_chart_name: jenkins/jenkins
jenkins_helm_release_name: jenkins
jenkins_helm_namespace: jenkins
jenkins_helm_values_file: "{{ playbook_dir }}/../k8s/jenkins-helm-values.yaml"
jenkins_helm_values_file_remote: "/tmp/jenkins-helm-values.yaml"
# Jenkins credentials from vault
jenkins_admin_username: "{{ vault_jenkins_admin_username | default('admin') }}"
jenkins_admin_password: "{{ vault_jenkins_admin_password | default('admin123') }}"
jenkins_nodeport: 30080

# NFS storage configuration
nfs_server_ip: 10.0.2.30
jenkins_nfs_path: /data/nfs/jenkins
jenkins_nfs_storage_size: 1Gi

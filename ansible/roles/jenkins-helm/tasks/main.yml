---
- name: Create Jenkins NFS storage
  include_tasks: create-nfs-storage.yml

- name: Setup RBAC permissions for Jenkins
  include_tasks: setup-rbac.yml

- name: Add Jenkins Helm repository
  kubernetes.core.helm_repository:
    name: "{{ jenkins_helm_repo_name }}"
    repo_url: "{{ jenkins_helm_repo_url }}"

- name: Update Helm repositories
  command: helm repo update
  changed_when: false
  failed_when: false
  ignore_errors: yes

- name: Copy Helm values file to remote
  template:
    src: "../../k8s/jenkins-helm-values.yaml"
    dest: "{{ jenkins_helm_values_file_remote }}"
    mode: '0644'
  vars:
    jenkins_admin_username: "{{ vault_jenkins_admin_username | default('admin') }}"
    jenkins_admin_password: "{{ vault_jenkins_admin_password | default('admin123') }}"

- name: Create Jenkins namespace
  shell: kubectl create namespace {{ jenkins_helm_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  changed_when: false

- name: Check if Jenkins is already installed
  command: helm list -n {{ jenkins_helm_namespace }} -o json
  register: helm_list
  changed_when: false
  failed_when: false

- name: Parse Helm list output
  set_fact:
    jenkins_installed: "{{ (helm_list.stdout | from_json) | selectattr('name', 'equalto', jenkins_helm_release_name) | list | length > 0 }}"
  when: helm_list.rc == 0

- name: Set jenkins_installed to false if helm list failed
  set_fact:
    jenkins_installed: false
  when: helm_list.rc != 0

- name: Install or Upgrade Jenkins using Helm
  command: >
    helm upgrade --install {{ jenkins_helm_release_name }} {{ jenkins_helm_chart_name }}
    --namespace {{ jenkins_helm_namespace }}
    --create-namespace
    --values {{ jenkins_helm_values_file_remote }}
  register: helm_result
  changed_when: "'has been upgraded' in helm_result.stdout or 'has been installed' in helm_result.stdout"

- name: Wait for Jenkins StatefulSet to be ready
  shell: kubectl rollout status statefulset/{{ jenkins_helm_release_name }} -n {{ jenkins_helm_namespace }} --timeout=30m
  changed_when: false
  register: wait_result
  retries: 2
  delay: 10
  until: wait_result.rc == 0

- name: Get Jenkins admin password from secret
  shell: kubectl get secret -n {{ jenkins_helm_namespace }} {{ jenkins_helm_release_name }} -o jsonpath='{.data.jenkins-admin-password}' | base64 -d
  register: jenkins_password_secret
  changed_when: false
  failed_when: false

- name: Set Jenkins password fact
  set_fact:
    jenkins_actual_password: "{{ jenkins_password_secret.stdout if jenkins_password_secret.rc == 0 else jenkins_admin_password }}"

- name: Get Jenkins service details
  shell: kubectl get svc {{ jenkins_helm_release_name }} -n {{ jenkins_helm_namespace }} -o json
  register: jenkins_service_raw
  changed_when: false

- name: Parse service details
  set_fact:
    jenkins_service: "{{ jenkins_service_raw.stdout | from_json }}"

- name: Display Jenkins access information
  debug:
    msg:
      - "=========================================="
      - "Jenkins Helm Installation Complete!"
      - "=========================================="
      - ""
      - "Access Jenkins at: http://10.0.2.10:{{ jenkins_nodeport }}"
      - "Username: {{ jenkins_admin_username }}"
      - "Password: {{ jenkins_actual_password }}"
      - ""
      - "Helm Release: {{ jenkins_helm_release_name }}"
      - "Namespace: {{ jenkins_helm_namespace }}"
      - "Storage: {{ jenkins_nfs_storage_size }} NFS ({{ nfs_server_ip }}:{{ jenkins_nfs_path }})"
      - ""
      - "To check status:"
      - "  kubectl get pods -n {{ jenkins_helm_namespace }}"
      - "  helm status {{ jenkins_helm_release_name }} -n {{ jenkins_helm_namespace }}"
      - ""
      - "To upgrade:"
      - "  helm upgrade {{ jenkins_helm_release_name }} {{ jenkins_helm_chart_name }} -f {{ jenkins_helm_values_file }} -n {{ jenkins_helm_namespace }}"
      - ""
      - "To uninstall:"
      - "  helm uninstall {{ jenkins_helm_release_name }} -n {{ jenkins_helm_namespace }}"
      - "=========================================="

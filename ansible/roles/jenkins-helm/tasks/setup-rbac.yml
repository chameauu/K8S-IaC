---
# Setup RBAC permissions for Jenkins to deploy to default namespace

- name: Create Jenkins deployer Role in default namespace
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: jenkins-deployer
      namespace: default
    rules:
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["get", "list", "create", "update", "patch", "delete"]
    - apiGroups: [""]
      resources: ["services", "pods", "events", "persistentvolumeclaims", "secrets"]
      verbs: ["get", "list", "create", "update", "patch", "delete"]
    EOF
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Create Jenkins ClusterRole for PersistentVolumes
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: jenkins-pv-manager
    rules:
    - apiGroups: [""]
      resources: ["persistentvolumes"]
      verbs: ["get", "list", "create", "update", "patch", "delete"]
    EOF
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Create Jenkins ClusterRoleBinding for PersistentVolumes
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: jenkins-pv-manager-binding
    subjects:
    - kind: ServiceAccount
      name: jenkins
      namespace: jenkins
    roleRef:
      kind: ClusterRole
      name: jenkins-pv-manager
      apiGroup: rbac.authorization.k8s.io
    EOF
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Create Jenkins deployer RoleBinding in default namespace
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: jenkins-deployer-binding
      namespace: default
    subjects:
    - kind: ServiceAccount
      name: jenkins
      namespace: jenkins
    roleRef:
      kind: Role
      name: jenkins-deployer
      apiGroup: rbac.authorization.k8s.io
    EOF
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  environment:
    KUBECONFIG: /home/vagrant/.kube/config


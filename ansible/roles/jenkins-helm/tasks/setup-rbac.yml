---
# Setup RBAC permissions for Jenkins to deploy to default namespace

- name: Create Jenkins deployer Role in default namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: jenkins-deployer
        namespace: default
      rules:
      - apiGroups: ["apps"]
        resources: ["deployments"]
        verbs: ["get", "list", "create", "update", "patch", "delete"]
      - apiGroups: [""]
        resources: ["services", "pods", "events", "persistentvolumeclaims", "secrets"]
        verbs: ["get", "list", "create", "update", "patch", "delete"]

- name: Create Jenkins ClusterRole for PersistentVolumes
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: jenkins-pv-manager
      rules:
      - apiGroups: [""]
        resources: ["persistentvolumes"]
        verbs: ["get", "list", "create", "update", "patch", "delete"]

- name: Create Jenkins ClusterRoleBinding for PersistentVolumes
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: jenkins-pv-manager-binding
      subjects:
      - kind: ServiceAccount
        name: jenkins
        namespace: jenkins
      roleRef:
        kind: ClusterRole
        name: jenkins-pv-manager
        apiGroup: rbac.authorization.k8s.io

- name: Create Jenkins deployer RoleBinding in default namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: jenkins-deployer-binding
        namespace: default
      subjects:
      - kind: ServiceAccount
        name: jenkins
        namespace: jenkins
      roleRef:
        kind: Role
        name: jenkins-deployer
        apiGroup: rbac.authorization.k8s.io

- name: Copy Nexus registry secret to jenkins namespace
  shell: |
    kubectl get secret nexus-docker-registry -n default -o yaml | \
    sed 's/namespace: default/namespace: jenkins/' | \
    kubectl apply -f -
  changed_when: false
  failed_when: false

- name: Create nexus-registry-secret-vault in jenkins namespace
  shell: |
    kubectl get secret nexus-docker-registry -n jenkins -o yaml | \
    sed 's/name: nexus-docker-registry/name: nexus-registry-secret-vault/' | \
    kubectl apply -f -
  changed_when: false
  failed_when: false

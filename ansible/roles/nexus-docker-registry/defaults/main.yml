---
# defaults file for nexus-docker-registry

# Nexus connection settings
nexus_url: "http://localhost:8081"
# Admin credentials (from vault)
nexus_admin_user: "admin"
nexus_admin_password: "{{ vault_nexus_password }}"
nexus_docker_registry_user: "{{ vault_nexus_docker_registry_user }}"
nexus_docker_registry_password: "{{ vault_nexus_docker_registry_password }}"

# Docker registry ports
nexus_docker_hosted_port: 8082
nexus_docker_proxy_port: 8083
nexus_docker_group_port: 8084

# Repository names
nexus_docker_hosted_repo: "docker-hosted"
nexus_docker_proxy_repo: "docker-proxy"
nexus_docker_group_repo: "docker-group"

# Blob store names
nexus_docker_hosted_blob: "docker-hosted"
nexus_docker_proxy_blob: "docker-proxy"
nexus_docker_group_blob: "docker-group"

# Docker Hub proxy settings
docker_hub_url: "https://registry-1.docker.io"
docker_hub_index: "REGISTRY"

# Deployment policy for hosted repository
# Options: ALLOW, ALLOW_ONCE, DENY
nexus_deployment_policy: "ALLOW"

# Enable anonymous access for Docker pulls
nexus_anonymous_access: true

# Wait time for Nexus to be ready (seconds)
nexus_wait_timeout: 300

# Kubernetes nodes configuration
nexus_registry_host: "10.0.2.30"
configure_k8s_nodes: true  # Set to false to skip k8s node configuration

# Kubernetes secrets configuration
create_k8s_secrets: true  # Set to false to skip creating K8s secrets
nexus_k8s_namespaces:  # Additional namespaces to create secrets in
  - jenkins
  - default

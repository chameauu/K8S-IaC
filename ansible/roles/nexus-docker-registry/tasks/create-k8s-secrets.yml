---
# Create Kubernetes secrets using kubectl commands
# This is simpler and doesn't require Python kubernetes library

- name: Create additional namespaces if they don't exist
  shell: |
    kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  loop: "{{ nexus_k8s_namespaces }}"
  when: 
    - nexus_k8s_namespaces is defined 
    - nexus_k8s_namespaces | length > 0
    - item != 'default'
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Create Kubernetes secret for Nexus credentials in default namespace
  shell: |
    kubectl create secret generic nexus-credentials \
      --from-literal=nexus-admin-user="{{ nexus_admin_user }}" \
      --from-literal=nexus-admin-password="{{ nexus_admin_password }}" \
      --from-literal=nexus-url="{{ nexus_url }}" \
      --namespace=default \
      --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Create Docker registry secret in default namespace
  shell: |
    kubectl create secret docker-registry nexus-docker-registry \
      --docker-server="{{ nexus_registry_host }}:{{ nexus_docker_hosted_port }}" \
      --docker-username="{{ nexus_docker_registry_user }}" \
      --docker-password="{{ nexus_docker_registry_password }}" \
      --namespace=default \
      --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Create Docker registry secret for group registry in default namespace
  shell: |
    kubectl create secret docker-registry nexus-docker-group \
      --docker-server="{{ nexus_registry_host }}:{{ nexus_docker_group_port }}" \
      --docker-username="{{ nexus_docker_registry_user }}" \
      --docker-password="{{ nexus_docker_registry_password }}" \
      --namespace=default \
      --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Create secrets in additional namespaces
  shell: |
    kubectl create secret generic nexus-credentials \
      --from-literal=nexus-admin-user="{{ nexus_admin_user }}" \
      --from-literal=nexus-admin-password="{{ nexus_admin_password }}" \
      --from-literal=nexus-url="{{ nexus_url }}" \
      --namespace={{ item }} \
      --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  loop: "{{ nexus_k8s_namespaces }}"
  when: 
    - nexus_k8s_namespaces is defined 
    - nexus_k8s_namespaces | length > 0
    - item != 'default'
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Create Docker registry secrets in additional namespaces
  shell: |
    kubectl create secret docker-registry nexus-docker-registry \
      --docker-server="{{ nexus_registry_host }}:{{ nexus_docker_hosted_port }}" \
      --docker-username="{{ nexus_docker_registry_user }}" \
      --docker-password="{{ nexus_docker_registry_password }}" \
      --namespace={{ item }} \
      --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  loop: "{{ nexus_k8s_namespaces }}"
  when: 
    - nexus_k8s_namespaces is defined 
    - nexus_k8s_namespaces | length > 0
    - item != 'default'
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Verify secrets were created
  shell: kubectl get secrets -n default | grep nexus
  delegate_to: "{{ groups['master'][0] }}"
  become: false
  run_once: true
  register: secrets_list
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Display created secrets
  debug:
    msg:
      - "✅ Kubernetes secrets created successfully!"
      - ""
      - "Secrets in default namespace:"
      - "{{ secrets_list.stdout_lines }}"
      - ""
      - "Usage examples:"
      - ""
      - "1. Use as environment variables:"
      - "   env:"
      - "     - name: NEXUS_PASSWORD"
      - "       valueFrom:"
      - "         secretKeyRef:"
      - "           name: nexus-credentials"
      - "           key: nexus-admin-password"
      - ""
      - "2. Pull images from Nexus:"
      - "   imagePullSecrets:"
      - "     - name: nexus-docker-registry"
      - ""
      - "3. View secret: kubectl get secret nexus-credentials -n default -o yaml"
      - "4. Decode value: kubectl get secret nexus-credentials -n default -o jsonpath='{.data.nexus-admin-password}' | base64 -d"
  delegate_to: localhost
  become: false
  run_once: true

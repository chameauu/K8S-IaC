---
# Create VaultStaticSecrets for Kubernetes image pulls from Nexus registry
# This allows Pods to authenticate to Nexus when pulling images

- name: Create namespaces for imagePullSecrets
  shell: kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ nexus_image_pull_namespaces }}"
  tags:
    - nexus-image-pull

- name: Copy VaultConnection to namespaces
  shell: |
    kubectl get vaultconnection vault-connection -n jenkins -o yaml 2>/dev/null | \
    sed 's/namespace: jenkins/namespace: {{ item }}/' | \
    kubectl apply -f -
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ nexus_image_pull_namespaces }}"
  register: vault_connection_result
  failed_when: false
  tags:
    - nexus-image-pull

- name: Create VaultAuth for namespaces
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: secrets.hashicorp.com/v1beta1
    kind: VaultAuth
    metadata:
      name: vault-auth
      namespace: {{ item }}
    spec:
      vaultConnectionRef: vault-connection
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: nexus
        serviceAccount: default
    EOF
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ nexus_image_pull_namespaces }}"
  tags:
    - nexus-image-pull

- name: Wait for VaultAuth to be ready in all namespaces
  shell: kubectl get vaultauth vault-auth -n {{ item }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ nexus_image_pull_namespaces }}"
  register: vaultauth_ready
  until: vaultauth_ready.stdout == "True"
  retries: 30
  delay: 2
  changed_when: false
  tags:
    - nexus-image-pull

- name: Create VaultStaticSecret for Nexus registry in namespaces
  shell: |
    cat <<'EOF' | kubectl apply -f -
    apiVersion: secrets.hashicorp.com/v1beta1
    kind: VaultStaticSecret
    metadata:
      name: nexus-registry-secret
      namespace: {{ item }}
    spec:
      vaultAuthRef: vault-auth
      mount: secret
      type: kv-v2
      path: nexus/docker-registry
      refreshAfter: 10m
      
      destination:
        name: nexus-registry-secret
        create: true
        type: kubernetes.io/dockerconfigjson
        
        transformation:
          templates:
            .dockerconfigjson:
              text: |
                {
                  "auths": {
                    "{{ "{{" }} .Secrets.server {{ "}}" }}": {
                      "username": "{{ "{{" }} .Secrets.username {{ "}}" }}",
                      "password": "{{ "{{" }} .Secrets.password {{ "}}" }}",
                      "auth": "{{ "{{" }} printf "%s:%s" .Secrets.username .Secrets.password | b64enc {{ "}}" }}"
                    }
                  }
                }
    EOF
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ nexus_image_pull_namespaces }}"
  register: vss_result
  changed_when: "'created' in vss_result.stdout or 'configured' in vss_result.stdout"
  tags:
    - nexus-image-pull

- name: Wait for VaultStaticSecrets to be synced
  shell: kubectl get vaultstaticsecret nexus-registry-secret -n {{ item }} -o jsonpath='{.status.conditions[?(@.type=="SecretSynced")].status}'
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ nexus_image_pull_namespaces }}"
  register: vss_synced
  until: vss_synced.stdout == "True"
  retries: 30
  delay: 2
  changed_when: false
  tags:
    - nexus-image-pull

- name: Link imagePullSecret to default service account in namespaces
  shell: |
    kubectl patch serviceaccount default \
      -p '{"imagePullSecrets":[{"name":"nexus-registry-secret"}]}' \
      -n {{ item }}
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ nexus_image_pull_namespaces }}"
  register: patch_result
  failed_when: false
  tags:
    - nexus-image-pull

- name: Display imagePullSecret configuration
  debug:
    msg:
      - "=========================================="
      - "Nexus Registry imagePullSecrets Created"
      - "=========================================="
      - ""
      - "VaultStaticSecrets created in namespaces:"
      - "  - default"
      - "  - jenkins"
      - "  - nexus"
      - ""
      - "Service accounts configured:"
      - "  - default (in all namespaces)"
      - ""
      - "Pods can now pull from Nexus registry:"
      - "  image: {{ nexus_registry_host }}:{{ nexus_docker_hosted_port }}/my-app:latest"
      - ""
      - "Verify:"
      - "  kubectl get vaultstaticsecret -A"
      - "  kubectl get secret nexus-registry-secret -n default"
      - "  kubectl describe sa default -n default"
      - "=========================================="
  tags:
    - nexus-image-pull

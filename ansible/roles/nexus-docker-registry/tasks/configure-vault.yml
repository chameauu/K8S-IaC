---
# Nexus-specific Vault configuration
# Following decentralized architecture: each tool manages its own secrets

- name: Read Vault root token
  include_vars:
    file: "{{ playbook_dir }}/vault-init.json"
    name: vault_init
  delegate_to: localhost
  tags:
    - nexus-vault

- name: Set Vault root token
  set_fact:
    vault_root_token: "{{ vault_init.root_token }}"
  tags:
    - nexus-vault

- name: Store Nexus admin secret in Vault
  shell: |
    kubectl exec -n {{ vault_namespace | default('vault') }} vault-0 -- \
      env VAULT_TOKEN="{{ vault_root_token }}" \
      vault kv put secret/nexus/admin \
      username='{{ nexus_admin_user }}' \
      password='{{ nexus_admin_password }}'
  delegate_to: "{{ k8s_master_node | default('master') }}"
  register: vault_admin_secret_result
  changed_when: "'created_time' in vault_admin_secret_result.stdout or 'version' in vault_admin_secret_result.stdout"
  tags:
    - nexus-vault

- name: Store Nexus Docker registry secret in Vault
  shell: |
    kubectl exec -n {{ vault_namespace | default('vault') }} vault-0 -- \
      env VAULT_TOKEN="{{ vault_root_token }}" \
      vault kv put secret/nexus/docker-registry \
      username='{{ nexus_admin_user }}' \
      password='{{ nexus_admin_password }}' \
      server='{{ nexus_registry_host }}:{{ nexus_docker_hosted_port }}'
  delegate_to: "{{ k8s_master_node | default('master') }}"
  register: vault_docker_secret_result
  changed_when: "'created_time' in vault_docker_secret_result.stdout or 'version' in vault_docker_secret_result.stdout"
  tags:
    - nexus-vault

- name: Create Nexus Vault policy
  shell: |
    kubectl exec -n {{ vault_namespace | default('vault') }} vault-0 -- \
      env VAULT_TOKEN="{{ vault_root_token }}" \
      sh -c 'vault policy write nexus-policy - <<EOF
    # Allow reading Nexus admin credentials
    path "secret/data/nexus/admin" {
      capabilities = ["read"]
    }

    # Allow reading Nexus Docker registry credentials
    path "secret/data/nexus/docker-registry" {
      capabilities = ["read"]
    }

    # Allow listing secrets
    path "secret/metadata/nexus/*" {
      capabilities = ["list"]
    }
    EOF'
  delegate_to: "{{ k8s_master_node | default('master') }}"
  register: vault_policy_result
  changed_when: "'Success' in vault_policy_result.stdout"
  tags:
    - nexus-vault

- name: Create Nexus Kubernetes auth role in Vault
  shell: |
    kubectl exec -n {{ vault_namespace | default('vault') }} vault-0 -- \
      env VAULT_TOKEN="{{ vault_root_token }}" \
      vault write auth/kubernetes/role/nexus \
      bound_service_account_names=default \
      bound_service_account_namespaces='*' \
      policies=nexus-policy \
      ttl=24h
  delegate_to: "{{ k8s_master_node | default('master') }}"
  register: vault_role_result
  changed_when: vault_role_result.rc == 0
  tags:
    - nexus-vault

- name: Display Nexus Vault configuration status
  debug:
    msg:
      - "Nexus secrets stored in Vault:"
      - "  - secret/nexus/admin"
      - "  - secret/nexus/docker-registry"
      - ""
      - "Nexus policy created: nexus-policy"
      - "Kubernetes auth role created: nexus"
  tags:
    - nexus-vault

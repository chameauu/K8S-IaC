---
# defaults file for gitea

# Gitea version
gitea_version: "latest"
gitea_image: "gitea/gitea:{{ gitea_version }}"

# Gitea ports
gitea_http_port: 3000
gitea_ssh_port: 2222

# Gitea configuration
gitea_app_name: "Gitea: Git with a cup of tea"
gitea_run_mode: "prod"

# Database (SQLite by default)
gitea_db_type: "sqlite3"

# Admin user (created on first run)
gitea_admin_username: "admin"
gitea_admin_password: "admin123"
gitea_admin_email: "admin@example.com"

# Server settings
gitea_domain: "10.0.2.30"
gitea_root_url: "http://{{ gitea_domain }}:{{ gitea_http_port }}/"
gitea_ssh_domain: "{{ gitea_domain }}"

# Docker volume
gitea_data_volume: "gitea-data"

# Container name
gitea_container_name: "gitea"

# Webhook configuration
# Use "*" for development to allow webhooks to any host
# Use specific IPs for production: "10.0.2.10,10.0.2.20"
gitea_webhook_allowed_hosts: "*"

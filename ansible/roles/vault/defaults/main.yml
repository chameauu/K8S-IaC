---
# defaults file for vault

# Vault version and configuration
vault_version: "1.21.2"
vault_replicas: 3
vault_storage_size: "500Mi"
vault_ui_nodeport: 30820
vault_namespace: "vault"

# NFS configuration
vault_nfs_server: "10.0.2.30"
vault_nfs_base_path: "/data/nfs/vault"
vault_nfs_uid: 200
vault_nfs_gid: 200

# Vault initialization
vault_key_shares: 5
vault_key_threshold: 3
vault_init_file: "vault-init.json"

# Kubernetes master node
k8s_master_node: "master"

# Vault Secrets Operator
vso_enabled: true
vso_version: "1.3.0"
vso_namespace: "vault-secrets-operator-system"

# Liveness and readiness probe configuration
# Accept sealed status to prevent CrashLoopBackOff
vault_liveness_probe_path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
vault_readiness_probe_path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

# Vault only manages its own infrastructure
# Individual tools (Jenkins, Nexus, Gitea) manage their own secrets
vault_secrets: []
vault_k8s_auth_roles: []
vault_policies: []
vault_static_secrets: []

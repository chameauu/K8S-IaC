---
# Install Vault using Helm

- name: Create Vault namespace
  shell: kubectl create namespace {{ vault_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ k8s_master_node }}"
  changed_when: false
  tags:
    - vault-install

- name: Add HashiCorp Helm repository
  shell: |
    helm repo add hashicorp https://helm.releases.hashicorp.com 2>/dev/null || true
    helm repo update
  changed_when: false
  tags:
    - vault-install

- name: Create Vault Helm values file
  template:
    src: vault-values.yaml.j2
    dest: /tmp/vault-values.yaml
  tags:
    - vault-install

- name: Check if Vault is already installed
  shell: helm list -n {{ vault_namespace }} | grep -q vault
  register: vault_installed
  failed_when: false
  changed_when: false
  tags:
    - vault-install

- name: Install Vault via Helm
  shell: |
    helm install vault hashicorp/vault \
      --namespace {{ vault_namespace }} \
      --values /tmp/vault-values.yaml
  when: vault_installed.rc != 0
  register: vault_install_result
  tags:
    - vault-install

- name: Wait for Vault pods to be created
  shell: kubectl get pods -n {{ vault_namespace }} -l app.kubernetes.io/name=vault -o name | wc -l
  delegate_to: "{{ k8s_master_node }}"
  register: vault_pod_count
  until: vault_pod_count.stdout | int >= vault_replicas
  retries: 30
  delay: 2
  changed_when: false
  when: vault_installed.rc != 0
  tags:
    - vault-install

- name: Display Vault installation status
  debug:
    msg: "Vault installed successfully. Pods are starting..."
  when: vault_install_result is changed
  tags:
    - vault-install

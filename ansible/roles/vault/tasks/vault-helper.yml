---
# Reusable Vault helper tasks for other roles
# This file can be included by any role that needs to interact with Vault

- name: Store secrets in Vault
  shell: |
    kubectl exec -n {{ vault_namespace | default('vault') }} vault-0 -- \
      env VAULT_TOKEN="{{ vault_root_token }}" \
      vault kv put {{ item.path }} \
      {% for key, value in item.data.items() %}{{ key }}='{{ value }}' {% endfor %}
  delegate_to: "{{ k8s_master_node | default('master') }}"
  loop: "{{ vault_secrets_to_store }}"
  register: vault_secret_store_result
  changed_when: "'created_time' in vault_secret_store_result.stdout or 'version' in vault_secret_store_result.stdout"
  when: vault_secrets_to_store is defined and vault_secrets_to_store | length > 0
  tags:
    - vault-secrets

- name: Create Vault policy
  shell: |
    kubectl exec -n {{ vault_namespace | default('vault') }} vault-0 -- \
      env VAULT_TOKEN="{{ vault_root_token }}" \
      vault policy write {{ item.name }} - <<EOF
    {{ item.policy }}
    EOF
  delegate_to: "{{ k8s_master_node | default('master') }}"
  loop: "{{ vault_policies_to_create }}"
  register: vault_policy_result
  changed_when: "'Success' in vault_policy_result.stdout"
  when: vault_policies_to_create is defined and vault_policies_to_create | length > 0
  tags:
    - vault-policies

- name: Create Kubernetes auth role in Vault
  shell: |
    kubectl exec -n {{ vault_namespace | default('vault') }} vault-0 -- \
      env VAULT_TOKEN="{{ vault_root_token }}" \
      vault write auth/kubernetes/role/{{ item.name }} \
      bound_service_account_names={{ item.bound_service_account_names }} \
      bound_service_account_namespaces={{ item.bound_service_account_namespaces }} \
      policies={{ item.policies }} \
      ttl={{ item.ttl }}
  delegate_to: "{{ k8s_master_node | default('master') }}"
  loop: "{{ vault_k8s_roles_to_create }}"
  register: vault_role_result
  changed_when: vault_role_result.rc == 0
  when: vault_k8s_roles_to_create is defined and vault_k8s_roles_to_create | length > 0
  tags:
    - vault-k8s-auth

- name: Create VaultStaticSecret resources
  shell: |
    cat <<'EOFVAULT' | kubectl apply -f -
    apiVersion: secrets.hashicorp.com/v1beta1
    kind: VaultStaticSecret
    metadata:
      name: {{ item.name }}
      namespace: {{ item.namespace }}
    spec:
      vaultAuthRef: {{ item.vault_auth_ref | default('vault-auth') }}
      mount: secret
      type: kv-v2
      path: {{ item.vault_path }}
      refreshAfter: {{ item.refresh_after | default('10m') }}
      
      destination:
        name: {{ item.destination_name | default(item.name) }}
        create: true
        type: {{ item.secret_type }}
        {% if item.transformation_template is defined %}
        
        transformation:
          templates:
            {{ item.template_key | default('.dockerconfigjson') }}:
              text: |
                {{ item.transformation_template | indent(16, first=True) }}
        {% endif %}
    EOFVAULT
  delegate_to: "{{ k8s_master_node | default('master') }}"
  loop: "{{ vault_static_secrets_to_create }}"
  register: vault_static_secret_result
  changed_when: "'created' in vault_static_secret_result.stdout or 'configured' in vault_static_secret_result.stdout"
  when: vault_static_secrets_to_create is defined and vault_static_secrets_to_create | length > 0
  tags:
    - vault-static-secrets

- name: Wait for VaultStaticSecrets to be synced
  shell: kubectl get vaultstaticsecret {{ item.name }} -n {{ item.namespace }} -o jsonpath='{.status.conditions[?(@.type=="SecretSynced")].status}'
  delegate_to: "{{ k8s_master_node | default('master') }}"
  loop: "{{ vault_static_secrets_to_create }}"
  register: vault_static_secret_synced
  until: vault_static_secret_synced.stdout == "True"
  retries: 30
  delay: 2
  changed_when: false
  when: vault_static_secrets_to_create is defined and vault_static_secrets_to_create | length > 0
  tags:
    - vault-static-secrets

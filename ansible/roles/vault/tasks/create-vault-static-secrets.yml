---
# Create VaultStaticSecrets

- name: Create VaultStaticSecret resources
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: secrets.hashicorp.com/v1beta1
    kind: VaultStaticSecret
    metadata:
      name: {{ item.name }}
      namespace: {{ item.namespace }}
    spec:
      vaultAuthRef: vault-auth
      mount: secret
      type: kv-v2
      path: {{ item.vault_path }}
      refreshAfter: {{ item.refresh_after }}
      
      destination:
        name: {{ item.name }}
        create: true
        type: {{ item.secret_type }}
        
        transformation:
          templates:
            .dockerconfigjson:
              text: |
                {{ item.transformation_template | indent(16) }}
    EOF
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ vault_static_secrets }}"
  register: vault_static_secret_result
  changed_when: "'created' in vault_static_secret_result.stdout or 'configured' in vault_static_secret_result.stdout"
  tags:
    - vault-static-secrets

- name: Wait for VaultStaticSecrets to be synced
  shell: kubectl get vaultstaticsecret {{ item.name }} -n {{ item.namespace }} -o jsonpath='{.status.conditions[?(@.type=="Synced")].status}'
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ vault_static_secrets }}"
  register: vault_static_secret_synced
  until: vault_static_secret_synced.stdout == "True"
  retries: 30
  delay: 2
  changed_when: false
  tags:
    - vault-static-secrets

- name: Verify Kubernetes Secrets are created
  shell: kubectl get secret {{ item.name }} -n {{ item.namespace }}
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ vault_static_secrets }}"
  register: k8s_secret_verify
  changed_when: false
  tags:
    - vault-static-secrets

- name: Display VaultStaticSecret status
  debug:
    msg:
      - "Created {{ vault_static_secrets | length }} VaultStaticSecret(s)"
      - "All secrets synced successfully"
  tags:
    - vault-static-secrets

---
# Configure Vault (enable KV engine, store secrets)

- name: Login to Vault
  shell: |
    kubectl exec -n {{ vault_namespace }} vault-0 -- vault login {{ vault_root_token }}
  delegate_to: "{{ k8s_master_node }}"
  changed_when: false
  no_log: true
  tags:
    - vault-config

- name: Check if KV secrets engine is enabled
  shell: |
    kubectl exec -n {{ vault_namespace }} vault-0 -- vault secrets list -format=json
  delegate_to: "{{ k8s_master_node }}"
  register: secrets_engines
  changed_when: false
  tags:
    - vault-config

- name: Enable KV v2 secrets engine
  shell: |
    kubectl exec -n {{ vault_namespace }} vault-0 -- vault secrets enable -path=secret kv-v2
  delegate_to: "{{ k8s_master_node }}"
  when: "'secret/' not in (secrets_engines.stdout | from_json)"
  register: kv_enable_result
  changed_when: "'Success' in kv_enable_result.stdout"
  tags:
    - vault-config

- name: Store secrets in Vault
  shell: |
    kubectl exec -n {{ vault_namespace }} vault-0 -- vault kv put {{ item.path }} \
      {% for key, value in item.data.items() %}{{ key }}='{{ value }}' {% endfor %}
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ vault_secrets }}"
  register: secret_store_result
  changed_when: "'created_time' in secret_store_result.stdout"
  no_log: true
  tags:
    - vault-config

- name: Verify secrets are stored
  shell: |
    kubectl exec -n {{ vault_namespace }} vault-0 -- vault kv get -format=json {{ item.path }}
  delegate_to: "{{ k8s_master_node }}"
  loop: "{{ vault_secrets }}"
  register: secret_verify
  changed_when: false
  failed_when: secret_verify.rc != 0
  no_log: true
  tags:
    - vault-config

- name: Display secrets stored
  debug:
    msg: "Stored {{ vault_secrets | length }} secrets in Vault"
  tags:
    - vault-config

---
# NGINX Ingress Controller Configuration
nginx_ingress_namespace: ingress-nginx
nginx_ingress_release_name: ingress-nginx
nginx_ingress_chart_name: ingress-nginx/ingress-nginx
nginx_ingress_chart_version: "4.15.1"

# Service Configuration
nginx_ingress_service_type: NodePort
nginx_ingress_http_port: 31080
nginx_ingress_https_port: 31443

# Controller Configuration
nginx_ingress_replicas: 1

# Resource Limits
nginx_ingress_cpu_request: "100m"
nginx_ingress_memory_request: "128Mi"
nginx_ingress_cpu_limit: "200m"
nginx_ingress_memory_limit: "256Mi"

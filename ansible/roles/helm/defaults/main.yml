---
# Helm version to install (leave empty for latest)
helm_version: ""

# Installation directory
helm_install_dir: "/usr/local/bin"

# Temporary download directory
helm_temp_dir: "/tmp"

# Helm binary URL (will be constructed if not provided)
helm_download_url: ""

# Architecture mapping
helm_arch_map:
  x86_64: "amd64"
  aarch64: "arm64"
  armv7l: "arm"

---
- name: Install Flannel CNI
  become_user: vagrant
  command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  register: flannel_install
  until: flannel_install.rc == 0
  retries: 3
  delay: 10

- name: Wait for Flannel DaemonSet to be created
  become_user: vagrant
  shell: kubectl get daemonset -n kube-flannel kube-flannel-ds 2>/dev/null
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  register: flannel_ds
  until: flannel_ds.rc == 0
  retries: 10
  delay: 5
  ignore_errors: true

- name: Configure Flannel to use NAT Network interface
  become_user: vagrant
  shell: |
    kubectl patch daemonset kube-flannel-ds -n kube-flannel --type='json' \
      -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--iface={{ flannel_iface }}"}]'
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  register: flannel_patch
  changed_when: "'patched' in flannel_patch.stdout"
  failed_when: false

- name: Restart Flannel DaemonSet to apply interface configuration
  become_user: vagrant
  command: kubectl rollout restart daemonset kube-flannel-ds -n kube-flannel
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  when: flannel_patch is changed

- name: Wait for Flannel pods to be ready
  become_user: vagrant
  shell: kubectl get pods -n kube-flannel -l app=flannel -o jsonpath='{.items[*].status.containerStatuses[0].ready}' | grep -o true | wc -l
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  register: flannel_ready
  until: flannel_ready.stdout | int >= 1
  retries: 30
  delay: 5
  changed_when: false

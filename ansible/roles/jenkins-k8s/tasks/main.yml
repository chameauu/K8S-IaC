---
# tasks file for jenkins-k8s
# Deploys Jenkins on Kubernetes using simplified StatefulSet

- name: Create Jenkins namespace
  kubernetes.core.k8s:
    name: jenkins
    api_version: v1
    kind: Namespace
    state: present
  delegate_to: localhost

- name: Copy Jenkins manifest to tools VM
  copy:
    src: jenkins-simple.yaml
    dest: /tmp/jenkins-simple.yaml
    mode: '0644'

- name: Deploy Jenkins to Kubernetes
  kubernetes.core.k8s:
    state: present
    src: /tmp/jenkins-simple.yaml
  delegate_to: localhost

- name: Wait for Jenkins pod to be ready
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: jenkins
    label_selectors:
      - app=jenkins
    wait: yes
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 300
  delegate_to: localhost
  register: jenkins_pod

- name: Get Jenkins service info
  kubernetes.core.k8s_info:
    kind: Service
    namespace: jenkins
    name: jenkins
  delegate_to: localhost
  register: jenkins_service

- name: Display Jenkins access information
  debug:
    msg:
      - "Jenkins is now running!"
      - "Access URL: http://{{ hostvars['master']['ansible_host'] }}:30080"
      - "Username: admin"
      - "To get password, run:"
      - "  vagrant ssh {{ jenkins_pod.resources[0].spec.nodeName }}"
      - "  sudo crictl ps | grep jenkins"
      - "  sudo crictl exec <container-id> cat /var/jenkins_home/secrets/initialAdminPassword"

---
- name: Configure Nexus as Docker Registry
  hosts: tools
  become: no
  gather_facts: yes

  pre_tasks:
    - name: Check if Nexus container is running
      command: docker ps --filter name=nexus --format "{{ '{{' }}.Status{{ '}}' }}"
      register: nexus_container
      changed_when: false
      failed_when: false

    - name: Display Nexus container status
      debug:
        msg: "Nexus container: {{ nexus_container.stdout if nexus_container.stdout else 'Not running' }}"

    - name: Fail if Nexus is not running
      fail:
        msg: |
          Nexus container is not running!
          
          Start Nexus with:
            vagrant ssh tools
            docker start nexus
          
          Or if not created yet:
            docker run -d -p 8081-8084:8081-8084 \
              --name nexus \
              -v nexus-data:/nexus-data \
              sonatype/nexus3:latest
      when: nexus_container.stdout == ""

    - name: Wait a moment for Nexus to initialize
      pause:
        seconds: 5
      when: "'starting' in nexus_container.stdout.lower()"

  roles:
    - nexus-docker-registry

  post_tasks:
    - name: Get list of repositories
      uri:
        url: "http://localhost:8081/service/rest/v1/repositories"
        method: GET
        user: admin
        password: admin123
        force_basic_auth: yes
        status_code: 200
      register: repositories
      failed_when: false

    - name: Display created repositories
      debug:
        msg: "Created repositories: {{ repositories.json | map(attribute='name') | list }}"
      when: repositories.status == 200

    - name: Test Docker login
      command: docker login 10.0.2.30:8082 -u admin -p admin123
      register: docker_login
      changed_when: false
      failed_when: false

    - name: Display Docker login result
      debug:
        msg: "{{ 'Docker login successful!' if docker_login.rc == 0 else 'Docker login failed - restart Docker and try again' }}"

    - name: Display next steps
      debug:
        msg:
          - ""
          - "=========================================="
          - "Configuration Complete!"
          - "=========================================="
          - ""
          - "✅ Nexus Docker registries configured"
          - "✅ Docker daemon configured for insecure registries"
          - "✅ Ready to push/pull images"
          - ""
          - "Next steps:"
          - ""
          - "1. Configure Kubernetes nodes:"
          - "   ansible-playbook ansible/playbooks/configure-k8s-nodes-nexus.yml"
          - ""
          - "2. Create Kubernetes secret:"
          - "   kubectl create secret docker-registry nexus-registry \\"
          - "     --docker-server=10.0.2.30:8082 \\"
          - "     --docker-username=admin \\"
          - "     --docker-password=admin123 \\"
          - "     --docker-email=admin@example.com"
          - ""
          - "3. Test push/pull:"
          - "   docker pull hello-world"
          - "   docker tag hello-world 10.0.2.30:8082/test/hello-world:latest"
          - "   docker push 10.0.2.30:8082/test/hello-world:latest"
          - ""
          - "4. Configure Jenkins credentials (see docs/NEXUS_DOCKER_REGISTRY_SETUP.md)"
          - ""
          - "=========================================="

---
# Automated Ansible Vault Setup (No user interaction)
# This playbook will:
# 1. Generate a strong vault password (or use existing)
# 2. Save it to ~/.ansible_vault_pass
# 3. Encrypt the vault.yml file if not already encrypted
# 4. Display the password for backup

- name: Setup Ansible Vault (Automated)
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    vault_password_file: "{{ lookup('env', 'HOME') }}/.ansible_vault_pass"
    vault_file: "{{ playbook_dir }}/../group_vars/all/vault.yml"
    force_new_password: false  # Set to true to generate new password even if one exists
    
  tasks:
    - name: Display setup start
      debug:
        msg:
          - "=== Starting Ansible Vault Setup ==="
          - "Vault password file: {{ vault_password_file }}"
          - "Vault file: {{ vault_file }}"

    - name: Check if vault password file exists
      stat:
        path: "{{ vault_password_file }}"
      register: vault_pass_stat

    - name: Generate strong random password
      shell: openssl rand -base64 32
      register: vault_password
      when: not vault_pass_stat.stat.exists or force_new_password
      changed_when: true

    - name: Save password to file
      copy:
        content: "{{ vault_password.stdout }}"
        dest: "{{ vault_password_file }}"
        mode: '0600'
      when: not vault_pass_stat.stat.exists or force_new_password

    - name: Display password creation status
      debug:
        msg: "{{ '✓ New vault password generated' if (not vault_pass_stat.stat.exists or force_new_password) else '✓ Using existing vault password' }}"

    - name: Read vault password
      slurp:
        src: "{{ vault_password_file }}"
      register: vault_password_content

    - name: Set password variable
      set_fact:
        current_password: "{{ vault_password_content.content | b64decode | trim }}"

    - name: Check if vault file exists
      stat:
        path: "{{ vault_file }}"
      register: vault_file_stat

    - name: Fail if vault file doesn't exist
      fail:
        msg: "Vault file not found: {{ vault_file }}"
      when: not vault_file_stat.stat.exists

    - name: Check if vault file is already encrypted
      shell: head -1 "{{ vault_file }}" | grep -q '^\$ANSIBLE_VAULT'
      register: vault_encrypted_check
      failed_when: false
      changed_when: false

    - name: Encrypt vault file
      shell: |
        ansible-vault encrypt "{{ vault_file }}" --vault-password-file "{{ vault_password_file }}"
      when: vault_encrypted_check.rc != 0
      register: encrypt_result

    - name: Display encryption status
      debug:
        msg: "{{ '✓ Vault file encrypted' if encrypt_result is changed else '✓ Vault file already encrypted' }}"

    - name: Verify encryption
      shell: head -1 "{{ vault_file }}" | grep -q '^\$ANSIBLE_VAULT'
      register: verify_encryption
      failed_when: verify_encryption.rc != 0
      changed_when: false

    - name: Create password backup file
      copy:
        content: |
          ==============================================
          ANSIBLE VAULT PASSWORD - SAVE THIS SECURELY!
          ==============================================
          
          Generated: {{ ansible_date_time.iso8601 }}
          Password: {{ current_password }}
          Location: {{ vault_password_file }}
          
          ⚠️  IMPORTANT NOTES:
          - This password is required to decrypt secrets
          - Store it in a password manager or secure location
          - Share with team members through secure channels only
          - If lost, you'll need to rekey all vault files
          
          QUICK REFERENCE:
          - View secrets: ansible-vault view {{ vault_file }}
          - Edit secrets: ansible-vault edit {{ vault_file }}
          - Rekey (change password): ansible-vault rekey {{ vault_file }}
          
          ==============================================
        dest: "/tmp/ansible_vault_password_{{ ansible_date_time.epoch }}.txt"
        mode: '0600'
      register: temp_password_file

    - name: Display setup summary
      debug:
        msg:
          - ""
          - "╔════════════════════════════════════════════════════════════╗"
          - "║         ANSIBLE VAULT SETUP COMPLETE                       ║"
          - "╚════════════════════════════════════════════════════════════╝"
          - ""
          - "✓ Vault password file: {{ vault_password_file }}"
          - "✓ Vault file encrypted: {{ vault_file }}"
          - "✓ Password backup: {{ temp_password_file.dest }}"
          - ""
          - "⚠️  SAVE THIS PASSWORD SECURELY:"
          - "   {{ current_password }}"
          - ""
          - "NEXT STEPS:"
          - "  1. View secrets:  ansible-vault view {{ vault_file }}"
          - "  2. Edit secrets:  ansible-vault edit {{ vault_file }}"
          - "  3. Run playbook:  ansible-playbook ansible/playbooks/site.yml -i ansible/inventory/hosts.ini"
          - ""
          - "For detailed documentation, see: ANSIBLE_VAULT_SETUP.md"
          - ""

    - name: Display password file location
      debug:
        msg:
          - "Password backup saved to: {{ temp_password_file.dest }}"
          - "View with: cat {{ temp_password_file.dest }}"

---
# Playbook to set up NFS server and clients for Kubernetes cluster

- name: Set up NFS server on tools VM
  hosts: tools
  become: yes
  roles:
    - role: ../roles/nfs-server
  tags:
    - nfs-server

- name: Set up NFS clients on Kubernetes nodes
  hosts: k8s_cluster
  become: yes
  roles:
    - role: ../roles/nfs-client
  tags:
    - nfs-client

- name: Verify NFS setup
  hosts: tools
  become: yes
  tasks:
    - name: Display NFS server summary
      debug:
        msg:
          - "=========================================="
          - "NFS Server Setup Complete!"
          - "=========================================="
          - ""
          - "NFS Server: {{ ansible_host }}"
          - "NFS Exports:"
          - "  - /data/nfs/jenkins (for Jenkins persistent storage)"
          - "  - /data/nfs/shared (for shared storage)"
          - "  - /data/nfs/vault (for Vault HA storage)"
          - ""
          - "NFS clients configured on all K8s nodes"
          - ""
          - "Next steps:"
          - "  - Vault will create its own PV/PVC during installation"
          - "  - Jenkins will create its own PV/PVC during deployment"
          - "=========================================="
  tags:
    - summary

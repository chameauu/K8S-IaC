---
- name: Configure Kubernetes nodes to use Nexus Docker registry
  hosts: k8s_cluster
  become: yes
  gather_facts: no

  vars:
    nexus_registry_host: "10.0.2.30"
    nexus_docker_hosted_port: 8082
    nexus_docker_proxy_port: 8083
    nexus_docker_group_port: 8084

  tasks:
    - name: Create containerd certs directory for Nexus hosted registry
      file:
        path: "/etc/containerd/certs.d/{{ nexus_registry_host }}:{{ nexus_docker_hosted_port }}"
        state: directory
        mode: '0755'

    - name: Configure Nexus hosted registry as insecure
      copy:
        dest: "/etc/containerd/certs.d/{{ nexus_registry_host }}:{{ nexus_docker_hosted_port }}/hosts.toml"
        content: |
          server = "http://{{ nexus_registry_host }}:{{ nexus_docker_hosted_port }}"
          
          [host."http://{{ nexus_registry_host }}:{{ nexus_docker_hosted_port }}"]
            capabilities = ["pull", "resolve", "push"]
            skip_verify = true
        mode: '0644'

    - name: Create containerd certs directory for Nexus proxy registry
      file:
        path: "/etc/containerd/certs.d/{{ nexus_registry_host }}:{{ nexus_docker_proxy_port }}"
        state: directory
        mode: '0755'

    - name: Configure Nexus proxy registry as insecure
      copy:
        dest: "/etc/containerd/certs.d/{{ nexus_registry_host }}:{{ nexus_docker_proxy_port }}/hosts.toml"
        content: |
          server = "http://{{ nexus_registry_host }}:{{ nexus_docker_proxy_port }}"
          
          [host."http://{{ nexus_registry_host }}:{{ nexus_docker_proxy_port }}"]
            capabilities = ["pull", "resolve"]
            skip_verify = true
        mode: '0644'

    - name: Create containerd certs directory for Nexus group registry
      file:
        path: "/etc/containerd/certs.d/{{ nexus_registry_host }}:{{ nexus_docker_group_port }}"
        state: directory
        mode: '0755'

    - name: Configure Nexus group registry as insecure
      copy:
        dest: "/etc/containerd/certs.d/{{ nexus_registry_host }}:{{ nexus_docker_group_port }}/hosts.toml"
        content: |
          server = "http://{{ nexus_registry_host }}:{{ nexus_docker_group_port }}"
          
          [host."http://{{ nexus_registry_host }}:{{ nexus_docker_group_port }}"]
            capabilities = ["pull", "resolve", "push"]
            skip_verify = true
        mode: '0644'

    - name: Restart containerd to apply changes
      systemd:
        name: containerd
        state: restarted

    - name: Wait for containerd to be ready
      wait_for:
        timeout: 10

    - name: Verify containerd is running
      systemd:
        name: containerd
        state: started
      register: containerd_status

    - name: Display configuration status
      debug:
        msg: "Containerd configured for Nexus registry on {{ inventory_hostname }}"

- name: Display summary
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Display completion message
      debug:
        msg:
          - ""
          - "=========================================="
          - "Kubernetes Nodes Configured for Nexus!"
          - "=========================================="
          - ""
          - "All Kubernetes nodes can now pull from:"
          - "  - 10.0.2.30:8082 (hosted)"
          - "  - 10.0.2.30:8083 (proxy)"
          - "  - 10.0.2.30:8084 (group)"
          - ""
          - "Next: Create Kubernetes secret"
          - ""
          - "  kubectl create secret docker-registry nexus-registry \\"
          - "    --docker-server=10.0.2.30:8082 \\"
          - "    --docker-username=admin \\"
          - "    --docker-password=admin123 \\"
          - "    --docker-email=admin@example.com"
          - ""
          - "Test deployment:"
          - ""
          - "  # Push image from tools VM"
          - "  docker tag nginx:alpine 10.0.2.30:8082/test/nginx:latest"
          - "  docker push 10.0.2.30:8082/test/nginx:latest"
          - ""
          - "  # Deploy to Kubernetes"
          - "  kubectl create deployment test-nginx --image=10.0.2.30:8082/test/nginx:latest"
          - "  kubectl patch deployment test-nginx -p '{\"spec\":{\"template\":{\"spec\":{\"imagePullSecrets\":[{\"name\":\"nexus-registry\"}]}}}}'"
          - "  kubectl get pods"
          - ""
          - "=========================================="

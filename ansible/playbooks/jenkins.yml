---
- name: Deploy Jenkins on Kubernetes
  hosts: tools
  become: no
  gather_facts: yes

  pre_tasks:
    - name: Check if kubectl is available
      command: kubectl version --client
      register: kubectl_check
      changed_when: false
      failed_when: false

    - name: Fail if kubectl is not available
      fail:
        msg: "kubectl is not installed or not in PATH. Please run tools.yml playbook first."
      when: kubectl_check.rc != 0

    - name: Check if Kubernetes cluster is accessible
      command: kubectl get nodes
      register: cluster_check
      changed_when: false
      failed_when: false

    - name: Fail if cluster is not accessible
      fail:
        msg: "Cannot access Kubernetes cluster. Please ensure cluster is running."
      when: cluster_check.rc != 0

    - name: Display cluster status
      debug:
        msg: "{{ cluster_check.stdout_lines }}"

  roles:
    - jenkins-k8s

  post_tasks:
    - name: Wait a moment for Jenkins to fully start
      pause:
        seconds: 10

    - name: Get Jenkins pod status
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: jenkins
        label_selectors:
          - app=jenkins
      delegate_to: localhost
      register: jenkins_pod_status

    - name: Display final status
      debug:
        msg:
          - "=========================================="
          - "Jenkins Deployment Complete!"
          - "=========================================="
          - ""
          - "Access Jenkins at: http://{{ hostvars['master']['ansible_host'] }}:30080"
          - "Username: admin"
          - ""
          - "To get the admin password:"
          - "1. SSH to node: vagrant ssh {{ jenkins_pod_status.resources[0].spec.nodeName }}"
          - "2. Find container: sudo crictl ps | grep jenkins"
          - "3. Get password: sudo crictl exec <container-id> cat /var/jenkins_home/secrets/initialAdminPassword"
          - ""
          - "Pod Status: {{ jenkins_pod_status.resources[0].status.phase }}"
          - "Running on: {{ jenkins_pod_status.resources[0].spec.nodeName }}"
          - ""
          - "Next steps:"
          - "- Complete the setup wizard in Jenkins UI"
          - "- Install Kubernetes plugin for dynamic agents"
          - "- Create your first pipeline"
          - ""
          - "Documentation: docs/JENKINS_SIMPLE_DEPLOYMENT.md"
          - "=========================================="

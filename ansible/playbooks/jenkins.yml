---
- name: Deploy Jenkins on Kubernetes
  hosts: tools
  become: no
  gather_facts: yes

  pre_tasks:
    - name: Check if kubectl is available
      command: kubectl version --client
      register: kubectl_check
      changed_when: false
      failed_when: false

    - name: Fail if kubectl is not available
      fail:
        msg: "kubectl is not installed or not in PATH. Please run tools.yml playbook first."
      when: kubectl_check.rc != 0

    - name: Check if Kubernetes cluster is accessible
      command: kubectl get nodes
      register: cluster_check
      changed_when: false
      failed_when: false

    - name: Fail if cluster is not accessible
      fail:
        msg: "Cannot access Kubernetes cluster. Please ensure cluster is running."
      when: cluster_check.rc != 0

    - name: Display cluster status
      debug:
        msg: "{{ cluster_check.stdout_lines }}"

  roles:
    - jenkins-simple

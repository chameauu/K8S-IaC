---
- name: Deploy Gitea Git Server on Tools VM
  hosts: tools
  become: no
  gather_facts: yes

  pre_tasks:
    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Fail if Docker is not installed
      fail:
        msg: |
          Docker is not installed on tools VM!
          
          Run tools playbook first:
            ansible-playbook ansible/playbooks/tools.yml
      when: docker_check.rc != 0

    - name: Check if Docker is running
      command: docker ps
      register: docker_running
      changed_when: false
      failed_when: false

    - name: Start Docker if not running
      systemd:
        name: docker
        state: started
      become: yes
      when: docker_running.rc != 0

    - name: Check if port 3000 is available
      wait_for:
        port: 3000
        state: stopped
        timeout: 1
      ignore_errors: yes
      register: port_check

    - name: Display port status
      debug:
        msg: "Port 3000 is {{ 'available' if port_check.failed else 'in use (will stop existing container)' }}"

  roles:
    - ../roles/gitea

  post_tasks:
    - name: Wait for Gitea to be fully ready
      pause:
        seconds: 10

    - name: Test Gitea accessibility
      uri:
        url: "http://localhost:3000"
        method: GET
        status_code: 200
      register: gitea_test
      failed_when: false

    - name: Display final status
      debug:
        msg:
          - ""
          - "=========================================="
          - "Gitea Deployment Complete!"
          - "=========================================="
          - ""
          - "✅ Gitea container running"
          - "✅ Web UI accessible"
          - "✅ Ready for Git operations"
          - ""
          - "Access Gitea:"
          - "  Web UI: http://10.0.2.30:3000"
          - "  SSH: ssh://git@10.0.2.30:2222"
          - ""
          - "First-time setup:"
          - "  1. Open http://10.0.2.30:3000"
          - "  2. Click 'Register' (top right)"
          - "  3. Create admin user:"
          - "     Username: admin"
          - "     Password: admin123"
          - "     Email: admin@example.com"
          - "  4. First user becomes admin automatically"
          - ""
          - "Create repository:"
          - "  1. Click '+' → 'New Repository'"
          - "  2. Name: hello-world-k8s"
          - "  3. Click 'Create Repository'"
          - ""
          - "Push sample app:"
          - "  cd sample-app"
          - "  git init"
          - "  git remote add origin http://10.0.2.30:3000/admin/hello-world-k8s.git"
          - "  git add ."
          - "  git commit -m 'Initial commit'"
          - "  git push -u origin main"
          - ""
          - "Configure Jenkins webhook:"
          - "  See: sample-app/GIT_WEBHOOK_SETUP.md"
          - ""
          - "Container management:"
          - "  docker logs gitea"
          - "  docker restart gitea"
          - "  docker stop gitea"
          - ""
          - "=========================================="

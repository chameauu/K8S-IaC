---
# Main playbook for setting up complete Kubernetes cluster
# Execution order follows dependency chain:
# 1. K8s cluster (common → master → workers)
# 2. NFS storage (required by Jenkins)
# 3. kubectl + Helm (required by tool deployments)
# 4. Remaining tools (Docker, Nexus, Gitea)
# 5. Jenkins (depends on NFS)

- name: Common node setup for all Kubernetes nodes
  hosts: k8s_cluster
  become: true
  roles:
    - ../roles/common-node

# Initialize Kubernetes master node
- import_playbook: master.yml

# Join worker nodes to cluster
- import_playbook: workers.yml

# Setup NFS storage (required by Jenkins)
- import_playbook: setup-nfs.yml

# - import_playbook: setup-ansible-vault.yml
# Install kubectl and Helm on tools VM
- name: Install kubectl and Helm on tools VM
  hosts: tools
  become: true
  roles:
    - ../roles/kubectl
    - ../roles/helm

# Install remaining tools (Docker, Nexus, and Gitea)
- name: Install Docker, Nexus, and Gitea on tools VM
  hosts: tools
  become: true
  roles:
    - ../roles/docker
    - ../roles/nexus
    - ../roles/nexus-docker-registry
    - ../roles/gitea

# Deploy Jenkins on Kubernetes (depends on NFS)
- import_playbook: jenkins.yml

# Deploy Prometheus and Grafana monitoring stack
- name: Deploy Prometheus and Grafana monitoring
  hosts: tools
  roles:
    - ../roles/prometheus-grafana
  tags:
    - monitoring
    - prometheus
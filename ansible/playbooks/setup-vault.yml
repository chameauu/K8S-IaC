---
- name: Setup HashiCorp Vault with Secrets Operator
  hosts: tools
  become: yes
  gather_facts: yes
  
  roles:
    - ../roles/vault
  
  post_tasks:
    - name: Display completion message
      debug:
        msg:
          - "=========================================="
          - "Vault Setup Complete!"
          - "=========================================="
          - ""
          - "Access Vault UI:"
          - "  URL: http://localhost:{{ vault_ui_nodeport }}"
          - ""
          - "Vault credentials saved to:"
          - "  {{ vault_init_file }}"
          - ""
          - "⚠️  IMPORTANT: Keep vault-init.json secure!"
          - "   It contains root token and unseal keys"
          - ""
          - "Verify installation:"
          - "  kubectl get pods -n {{ vault_namespace }}"
          - "  kubectl get vaultauth -n jenkins"
          - "  kubectl get vaultstaticsecret -n jenkins"
          - "  kubectl get secret nexus-registry-secret-vault -n jenkins"
          - ""
          - "Next steps:"
          - "  1. Test Jenkins build with Vault-managed secrets"
          - "  2. Enable audit logging (optional)"
          - "  3. Implement secret rotation (optional)"

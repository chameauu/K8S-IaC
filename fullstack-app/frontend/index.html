<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }
        
        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: 600;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .users-list {
            margin-top: 20px;
        }
        
        .user-card {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .user-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .user-info p {
            color: #666;
            font-size: 14px;
        }
        
        .delete-btn {
            background: #e74c3c;
            padding: 8px 20px;
            width: auto;
            font-size: 14px;
        }
        
        .delete-btn:hover {
            background: #c0392b;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 18px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 User Management</h1>
        
        <div id="status"></div>
        
        <div class="form-section">
            <h2 style="margin-bottom: 20px; color: #333;">Add New User</h2>
            <form id="userForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter email">
                </div>
                <button type="submit">Add User</button>
            </form>
        </div>
        
        <div class="users-list">
            <h2 style="margin-bottom: 20px; color: #333;">Users List</h2>
            <div id="usersList"></div>
        </div>
    </div>

    <script>
        // Use relative path to call backend through NGINX proxy
        const API_URL = '/api';

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                statusDiv.textContent = '';
                statusDiv.className = '';
            }, 3000);
        }

        async function fetchUsers() {
            try {
                const response = await fetch(`${API_URL}/users`);
                const result = await response.json();
                
                if (result.success) {
                    displayUsers(result.data);
                } else {
                    showStatus('Error loading users', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('Failed to connect to backend', 'error');
            }
        }

        function displayUsers(users) {
            const usersList = document.getElementById('usersList');
            
            if (users.length === 0) {
                usersList.innerHTML = '<p style="text-align: center; color: #999;">No users yet. Add one above!</p>';
                return;
            }
            
            usersList.innerHTML = users.map(user => `
                <div class="user-card">
                    <div class="user-info">
                        <h3>${user.name}</h3>
                        <p>${user.email}</p>
                        <p style="font-size: 12px; color: #999;">Added: ${new Date(user.created_at).toLocaleString()}</p>
                    </div>
                    <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
                </div>
            `).join('');
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            try {
                const response = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('User added successfully!', 'success');
                    document.getElementById('userForm').reset();
                    fetchUsers();
                } else {
                    showStatus('Error adding user', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('Failed to add user', 'error');
            }
        });

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            
            try {
                const response = await fetch(`${API_URL}/users/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('User deleted successfully!', 'success');
                    fetchUsers();
                } else {
                    showStatus('Error deleting user', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('Failed to delete user', 'error');
            }
        }

        // Load users on page load
        fetchUsers();
    </script>
</body>
</html>

---
# Create Kubernetes secrets from Jenkins credentials
# This allows Kubernetes pods to access Jenkins credentials

- name: Create Kubernetes secret for Jenkins credentials in jenkins namespace
  shell: |
    kubectl create secret generic jenkins-credentials \
      --from-literal=jenkins-admin-username="{{ jenkins_admin_username }}" \
      --from-literal=jenkins-admin-password="{{ jenkins_admin_password }}" \
      --namespace={{ jenkins_namespace }} \
      --dry-run=client -o yaml | kubectl apply -f -
  changed_when: false

- name: Create secrets in additional namespaces
  shell: |
    kubectl create secret generic jenkins-credentials \
      --from-literal=jenkins-admin-username="{{ jenkins_admin_username }}" \
      --from-literal=jenkins-admin-password="{{ jenkins_admin_password }}" \
      --namespace={{ item }} \
      --dry-run=client -o yaml | kubectl apply -f -
  loop: "{{ jenkins_k8s_namespaces }}"
  when: 
    - jenkins_k8s_namespaces is defined 
    - jenkins_k8s_namespaces | length > 0
    - item != jenkins_namespace
  changed_when: false

- name: Verify secrets were created
  shell: kubectl get secrets -n {{ jenkins_namespace }} | grep jenkins
  register: secrets_list
  changed_when: false

- name: Display created secrets
  debug:
    msg:
      - "✅ Kubernetes secrets created successfully!"
      - ""
      - "Secrets in {{ jenkins_namespace }} namespace:"
      - "{{ secrets_list.stdout_lines }}"
      - ""
      - "Usage examples:"
      - ""
      - "1. Use as environment variables:"
      - "   env:"
      - "     - name: JENKINS_ADMIN_USER"
      - "       valueFrom:"
      - "         secretKeyRef:"
      - "           name: jenkins-credentials"
      - "           key: jenkins-admin-username"
      - "     - name: JENKINS_ADMIN_PASSWORD"
      - "       valueFrom:"
      - "         secretKeyRef:"
      - "           name: jenkins-credentials"
      - "           key: jenkins-admin-password"
      - ""
      - "2. View secret: kubectl get secret jenkins-credentials -n {{ jenkins_namespace }} -o yaml"
      - "3. Decode value: kubectl get secret jenkins-credentials -n {{ jenkins_namespace }} -o jsonpath='{.data.jenkins-admin-password}' | base64 -d"

---
# Jenkins Helm Chart Values
# Deploys Jenkins on Kubernetes with NFS storage - Simplified single pod

controller:
  # Admin credentials
  admin:
    createSecret: true
    username: admin
    password: admin123
  
  # Service configuration
  serviceType: NodePort
  nodePort: 30080
  
  # Resource limits
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  
  # Jenkins URL
  jenkinsUrl: "http://10.0.2.10:30080"
  jenkinsUriPrefix: ""
  
  # Disable sidecar containers to simplify deployment
  sidecars:
    configAutoReload:
      enabled: false
  
  # Install essential plugins (let Jenkins resolve versions)
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - credentials-binding
    - docker-workflow

# Persistence configuration - use existing NFS PVC
persistence:
  enabled: true
  existingClaim: jenkins-nfs-pvc
  storageClass: nfs
  size: 1Gi
  accessMode: ReadWriteMany

# Service account
serviceAccount:
  create: true
  name: jenkins

# Enable Kubernetes agents for dynamic pod creation
agent:
  enabled: true
  namespace: jenkins
  image:
    repository: jenkins/inbound-agent
    tag: latest
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Allow agents to run on any node
  podRetention: "Never"
  showRawYaml: false
